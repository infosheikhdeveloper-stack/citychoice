<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - City Choice Bakery</title>

<!-- Font Awesome & Google Fonts -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="login.css">
<link rel="stylesheet" href="alert.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
</head>

<body>

<!-- TOP ALERT -->
<div class="top-alert" id="topAlert">
  <div class="alert-icon" id="alertIcon">
    <i class="fa-solid fa-check"></i>
  </div>
  <div class="alert-content">
    <div class="alert-title" id="alertTitle">Success</div>
    <div class="alert-text" id="alertText">Message here</div>
  </div>
  <div class="alert-close" onclick="closeTopAlert()">
    <i class="fa-solid fa-xmark"></i>
  </div>
</div>

<!-- HERO BACKGROUND SECTION -->
<div class="app-hero" id="videoHero">
  <div class="hero-header">
    <div class="app-logo">
      <i class="fa-solid fa-store"></i>
    </div>
    <h1>City Choice Bakery</h1>
    <p>One app for fresh bakery, sweets & food in minutes!</p>
  </div>

  <div class="hero-banner-img">
    <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=800&auto=format&fit=crop" alt="Bakery Items">
  </div>

  <div class="hero-actions">
    <button class="btn-primary" onclick="showLogin()">Login</button>
    <button class="btn-secondary" onclick="showSignup()">Create Account</button>
  </div>
</div>

<!-- OVERLAY BACKDROP -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="closeForms()"></div>

<!-- LOGIN BOTTOM SHEET -->
<div class="bottom-sheet hidden" id="loginBox">
  <div class="sheet-handle"></div>
  <div class="top-bar">
    <h2>Welcome Back!</h2>
    <span class="close-btn" onclick="closeForms()"><i class="fa-solid fa-xmark"></i></span>
  </div>

  <div class="input-group">
    <input type="email" id="loginEmail" placeholder=" " required>
    <label>Enter Email Address</label>
  </div>

  <div class="input-group">
    <input type="password" id="loginPassword" placeholder=" " required>
    <label>Enter Password</label>
  </div>

  <button class="action-btn" onclick="loginUser()">Continue</button>
  <p class="switch-text">New here? <span onclick="showSignup()">Create an account</span></p>
</div>

<!-- SIGNUP BOTTOM SHEET -->
<div class="bottom-sheet hidden" id="signupBox">
  <div class="sheet-handle"></div>
  <div class="top-bar">
    <h2>Create Account</h2>
    <span class="close-btn" onclick="closeForms()"><i class="fa-solid fa-xmark"></i></span>
  </div>

  <div class="scroll-area">
    <div class="input-group">
      <input type="text" id="name" placeholder=" " required>
      <label>Full Name</label>
    </div>

    <div class="input-group">
      <input type="text" id="phone" placeholder=" " required>
      <label>Phone Number</label>
    </div>

    <div class="input-group">
      <input type="email" id="email" placeholder=" " required>
      <label>Email Address</label>
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder=" " required>
      <label>Create Password</label>
    </div>

    <!-- PINCODE SEARCH -->
    <div class="pin-box">
      <div class="input-group">
        <input type="text" id="pinSearch" placeholder=" " oninput="filterPincodes()">
        <label>Search Pincode...</label>
      </div>

      <div class="select-wrapper">
        <select id="pincodeSelect">
          <option value="">Select Pincode</option>
        </select>
        <i class="fa-solid fa-chevron-down"></i>
      </div>
    </div>

    <button class="location-btn" onclick="getLocation()">
      <i class="fa-solid fa-location-crosshairs"></i> Use Current Location
    </button>

    <div class="input-group">
      <input type="text" id="location" placeholder=" " readonly>
      <label>Location Details</label>
    </div>
  </div>

  <button class="action-btn" onclick="signupUser()">Create Account</button>
  <p class="switch-text">Already have an account? <span onclick="showLogin()">Login</span></p>
</div>

<script>

/* ================= UI CONTROLS ================= */

function showLogin(){
  document.getElementById("modalOverlay").classList.remove("hidden");
  document.getElementById("signupBox").classList.add("hidden");
  
  const loginBox = document.getElementById("loginBox");
  loginBox.classList.remove("hidden");
  setTimeout(() => loginBox.classList.add("active"), 10);
}

function showSignup(){
  document.getElementById("modalOverlay").classList.remove("hidden");
  document.getElementById("loginBox").classList.add("hidden");
  
  const signupBox = document.getElementById("signupBox");
  signupBox.classList.remove("hidden");
  setTimeout(() => signupBox.classList.add("active"), 10);
}

function closeForms(){
  const loginBox = document.getElementById("loginBox");
  const signupBox = document.getElementById("signupBox");
  
  loginBox.classList.remove("active");
  signupBox.classList.remove("active");
  
  setTimeout(() => {
    loginBox.classList.add("hidden");
    signupBox.classList.add("hidden");
    document.getElementById("modalOverlay").classList.add("hidden");
  }, 300);
}

/* ================= LOCATION (FIXED) ================= */

function getLocation(){

  if(!navigator.geolocation){
    showTopAlert(
      "error",
      "Unsupported Device",
      "Location not supported"
    );
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (pos)=>{

      let lat = pos.coords.latitude;
      let lng = pos.coords.longitude;

      try {

        let res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
        );

        let data = await res.json();

        let area =
          data.address.city ||
          data.address.town ||
          data.address.village ||
          data.address.county ||
          data.display_name;

        document.getElementById("location").value = area;

      } catch (e) {
        showTopAlert(
          "error",
          "Location Error",
          "Location fetch failed"
        );
      }

    },
    (err)=>{
      showTopAlert(
        "error",
        "Location Error",
        "Permission denied or GPS OFF ❌"
      );
    }
  );
}

/* ================= SIGNUP ================= */

async function signupUser(){

  let user = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    pincode: document.getElementById("pincodeSelect").value,
    location: document.getElementById("location").value
  };

  let password = document.getElementById("password").value;

  if(!user.pincode){
    showTopAlert(
      "error",
      "Pincode Required",
      "Please select pincode"
    );
    return;
  }

  let { data: pinData, error: pinError } = await supabaseClient
    .from("pincodes")
    .select("code");

  if(pinError){
    console.log(pinError);
    return;
  }

  let allowed = pinData.map(p => p.code);

  if(!allowed.includes(user.pincode)){
    showTopAlert(
      "error",
      "Delivery Not Available",
      "Sorry! is area me delivery available nahi hai"
    );
    return;
  }

  let { error } = await supabaseClient.auth.signUp({
    email: user.email,
    password: password
  });

  if(error){
    showTopAlert(
      "error",
      "Error",
      error?.message || "Something went wrong"
    );
    return;
  }

  await supabaseClient.from("users").insert([user]);

  showTopAlert(
    "success",
    "Signup Successful",
    "Your account has been created ✔"
  );
  window.location.href="index.html";
}

/* ================= LOGIN ================= */

async function loginUser(){

  let email = document.getElementById("loginEmail").value.trim();
  let pass = document.getElementById("loginPassword").value.trim();

  if(!email || !pass){
    showTopAlert(
      "error",
      "Missing Fields",
      "Please enter email and password"
    );
    return;
  }

  let { error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: pass
  });

  if(error){
    showTopAlert(
      "error",
      "Login Failed",
      error.message
    );
  } else {
    showTopAlert(
      "success",
      "Login Successful",
      "Welcome back ✔"
    );

    setTimeout(()=>{
      window.location.href="account.html";
    }, 1200);
  }
}

/* ================= PINCODES ================= */

let allPincodes = [];

async function loadPincodes(){

  let { data, error } = await supabaseClient
    .from("pincodes")
    .select("*");

  if(error){
    console.log(error);
    return;
  }

  allPincodes = data;

  let select = document.getElementById("pincodeSelect");

  data.forEach(pin=>{
    let option = document.createElement("option");
    option.value = pin.code;
    option.textContent = `${pin.code} - ${pin.area}`;
    select.appendChild(option);
  });
}

loadPincodes();

function filterPincodes(){

  let value = document.getElementById("pinSearch").value.toLowerCase();

  let select = document.getElementById("pincodeSelect");

  select.innerHTML = `<option value="">Select Pincode</option>`;

  allPincodes
    .filter(p => p.code.includes(value))
    .forEach(pin=>{

      let option = document.createElement("option");
      option.value = pin.code;
      option.textContent = `${pin.code} - ${pin.area}`;

      select.appendChild(option);
    });
}

// =========================
// TOP ALERT
// =========================

function showTopAlert(type,title,message){

  const alertBox = document.getElementById("topAlert");
  const alertIcon = document.getElementById("alertIcon");

  document.getElementById("alertTitle").innerText = title;
  document.getElementById("alertText").innerText = message;

  alertBox.classList.remove("success", "error");

  if(type === "success"){
    alertBox.classList.add("success");
    alertIcon.innerHTML = `<i class="fa-solid fa-check"></i>`;
  }else{
    alertBox.classList.add("error");
    alertIcon.innerHTML = `<i class="fa-solid fa-xmark"></i>`;
  }

  alertBox.classList.add("show");

  setTimeout(()=>{
    closeTopAlert();
  },3000);
}

function closeTopAlert(){
  document.getElementById("topAlert").classList.remove("show");
}

</script>
</body>
</html>
