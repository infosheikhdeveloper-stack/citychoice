<!-- viewdetail.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Order Details</title>

<link rel="stylesheet" href="header.css">
<link rel="stylesheet" href="viewdetail.css">
<link rel="stylesheet" href="back.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

  <!-- HEADER -->
<header class="top-header">

  <div class="logo-section">

    <div class="logo-circle">
      <img src="logo.png">
    </div>

    <div class="logo-text-box">
      <h1 class="logo-text">City Choice Bakery</h1>

      <div class="location-anim">
        <i class="fa-solid fa-location-dot"></i>
        <span id="headerLocation">Loading...</span>
      </div>

    </div>

  </div>



</header>

<!-- PAGE -->

<div class="detail-container">

<div class="page-title">
<i class="fa-solid fa-receipt"></i>
Order Details
</div>

<!-- ORDER INFO -->

<div class="detail-card">

<div class="top-flex">

<div>

<div class="mini-box">
<i class="fa-solid fa-hashtag"></i>
<span id="orderId">Loading...</span>
</div>

<div class="mini-box">
<i class="fa-solid fa-box"></i>
<span id="packageCode">Loading...</span>
</div>

</div>

<div>

<div class="mini-box">
<i class="fa-solid fa-calendar"></i>
<span id="orderDate">Loading...</span>
</div>

<div class="mini-box">
<i class="fa-solid fa-clock"></i>
<span id="orderTime">Loading...</span>
</div>

</div>

</div>

<div class="customer-box">

<div class="customer-item">
<i class="fa-solid fa-user"></i>
<span id="customerName"></span>
</div>

<div class="customer-item">
<i class="fa-solid fa-phone"></i>
<span id="customerPhone"></span>
</div>

<div class="customer-item">
<i class="fa-solid fa-envelope"></i>
<span id="customerEmail"></span>
</div>

<div class="customer-item">
<i class="fa-solid fa-wallet"></i>
<span id="paymentMethod"></span>
</div>

</div>

</div>

<!-- STATUS -->

<div class="status-alert"
id="statusAlert">

Loading status...

</div>

<!-- ITEMS -->

<div class="detail-card">

<div class="section-title">
<i class="fa-solid fa-bag-shopping"></i>
Ordered Items
</div>

<div id="itemsBox"></div>

</div>

<!-- LIVE TRACK -->

<div class="detail-card">

<div class="section-title">
<i class="fa-solid fa-truck"></i>
Live Delivery Tracking
</div>

<div class="track-line">

<div class="track-step active">
<div class="circle">
<i class="fa-solid fa-check"></i>
</div>
<p>Assigned</p>
</div>

<div class="line active-line"></div>

<div class="track-step"
id="acceptedStep">

<div class="circle">
<i class="fa-solid fa-store"></i>
</div>

<p>Accepted</p>

</div>

<div class="line"
id="line2"></div>

<div class="track-step"
id="pickupStep">

<div class="circle">
<i class="fa-solid fa-box"></i>
</div>

<p>Picked Up</p>

</div>

<div class="line"
id="line3"></div>

<div class="track-step"
id="deliveryStep">

<div class="circle">
<i class="fa-solid fa-motorcycle"></i>
</div>

<p>Out Delivery</p>

</div>

<div class="line"
id="line4"></div>

<div class="track-step"
id="doneStep">

<div class="circle">
<i class="fa-solid fa-house"></i>
</div>

<p>Delivered</p>

</div>

</div>

</div>

<!-- BILL -->

<div class="detail-card">

<div class="section-title">
<i class="fa-solid fa-file-invoice"></i>
Bill Summary
</div>

<div class="bill-row">
<span>
<i class="fa-solid fa-receipt"></i>
Subtotal
</span>

<b id="subtotal"></b>
</div>

<div class="bill-row">
<span>
<i class="fa-solid fa-percent"></i>
Tax
</span>

<b id="tax"></b>
</div>

<div class="bill-row">
<span>
<i class="fa-solid fa-truck"></i>
Delivery
</span>

<b id="delivery"></b>
</div>

<div class="bill-row">
<span>
<i class="fa-solid fa-layer-group"></i>
Platform Charge
</span>

<b id="platform"></b>
</div>

<div class="bill-row grand">
<span>
<i class="fa-solid fa-money-bill"></i>
Grand Total
</span>

<b id="grandTotal"></b>
</div>

<div class="payment-status">

<div class="paid">
<i class="fa-solid fa-circle-check"></i>
Paid
</div>

<div class="due">
<i class="fa-solid fa-clock"></i>
No Due
</div>

</div>

</div>

<!-- BUTTON -->

<button class="invoice-btn"
onclick="downloadInvoice()">

<i class="fa-solid fa-download"></i>
Download Invoice

</button>

</div>

<!-- ALERT -->

<div class="overlay"
id="overlay"></div>

<div class="bottom-sheet"
id="bottomSheet">

<div id="sheetContent"></div>

</div>

<script>

// ================= SUPABASE =================

const SUPABASE_URL =
"https://ftuchilcswtnnldrugir.supabase.co";

const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0dWNoaWxjc3d0bm5sZHJ1Z2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNjAyNDQsImV4cCI6MjA5NDczNjI0NH0.88SWE5lvsJD0Fw8x7h4pgAmq1WFRN1qMvmXHCXeDqsU";

const supabaseClient =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

// ================= GET ORDER ID =================

const params =
new URLSearchParams(window.location.search);

const orderId =
params.get("id");

// ================= LOAD ORDER =================

async function loadOrder(){

const { data, error } =
await supabaseClient
.from("orders")
.select("*")
.eq("id", orderId)
.single();

if(error || !data){

alert("Order not found");

return;

}

const order = data;

// ================= BASIC =================

document.getElementById("orderId")
.innerText = order.order_id;

document.getElementById("packageCode")
.innerText = order.package_code;

document.getElementById("customerName")
.innerText = order.customer_name;

document.getElementById("customerPhone")
.innerText = order.phone;

document.getElementById("paymentMethod")
.innerText = order.payment_method;

const { data:userData } =
await supabaseClient.auth.getUser();

document.getElementById("customerEmail")
.innerText =
userData.user?.email || "";

// DATE TIME

const date =
new Date(order.created_at);

document.getElementById("orderDate")
.innerText =
date.toLocaleDateString();

document.getElementById("orderTime")
.innerText =
date.toLocaleTimeString();

// ================= STATUS =================

const statusBox =
document.getElementById("statusAlert");

if(order.status === "Accepted"){

statusBox.className =
"status-alert success";

statusBox.innerHTML = `
<i class="fa-solid fa-circle-check"></i>
Your order has been accepted successfully
`;

activateAccepted();

}else if(order.status === "Cancelled"){

statusBox.className =
"status-alert cancel";

statusBox.innerHTML = `
<i class="fa-solid fa-circle-xmark"></i>
Sorry your order has been cancelled
`;

}else{

statusBox.className =
"status-alert waiting";

statusBox.innerHTML = `
<i class="fa-solid fa-clock"></i>
Your order is waiting for confirmation
`;

}

// ================= ITEMS =================

const itemsBox =
document.getElementById("itemsBox");

let items = order.items;

if(typeof items === "string"){
items = JSON.parse(items);
}

items.forEach(item=>{

itemsBox.innerHTML += `

<div class="item-card">

<img src="${item.image}">

<div class="item-content">

<h3>${item.title}</h3>

<p>
Fresh & delicious bakery item
</p>

<div class="item-bottom">

<span>
Qty : ${item.qty}
</span>

<b>
₹${item.price * item.qty}
</b>

</div>

</div>

</div>

`;

});

// ================= BILL =================

document.getElementById("subtotal")
.innerText = `₹${order.subtotal}`;

document.getElementById("tax")
.innerText = `₹${order.tax}`;

document.getElementById("delivery")
.innerText =
`₹${order.delivery_charge}`;

document.getElementById("platform")
.innerText =
`₹${order.platform_charge}`;

document.getElementById("grandTotal")
.innerText =
`₹${order.grand_total}`;

}

loadOrder();

// ================= TRACK =================

function activateAccepted(){

document.getElementById("acceptedStep")
.classList.add("active");

document.getElementById("line2")
.classList.add("active-line");

}

// ================= ALERT =================

function showSheet(html){

document.getElementById("sheetContent")
.innerHTML = html;

document.getElementById("overlay")
.classList.add("show");

document.getElementById("bottomSheet")
.classList.add("show");

}

// CLOSE
document.getElementById("overlay")
.onclick = ()=>{

document.getElementById("overlay")
.classList.remove("show");

document.getElementById("bottomSheet")
.classList.remove("show");

}

// ================= DOWNLOAD =================

async function downloadInvoice(){

const { data } =
await supabaseClient
.from("orders")
.select("status")
.eq("id", orderId)
.single();

if(data.status !== "Accepted"){

showSheet(`

<div class="sheet-icon cancel-icon">
<i class="fa-solid fa-xmark"></i>
</div>

<h2>
Invoice Not Ready
</h2>

<p>
Admin has not accepted your order yet.
Please wait until order confirmation.
</p>

`);

return;

}

showSheet(`

<div class="sheet-icon success-icon">
<i class="fa-solid fa-check"></i>
</div>

<h2>
Invoice Ready
</h2>

<p>
Your invoice download is ready now.
</p>

`);

setTimeout(()=>{

window.print();

},1500);

}

</script>
<script src="back.js"></script>
</body>
</html>
