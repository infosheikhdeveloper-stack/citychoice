<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Detail</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="product.css">
  <link rel="stylesheet" href="back.css">
   
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>



</head>

<body>
  
  <!-- TOP ALERT -->

<div class="top-alert"
id="topAlert">

<div class="alert-icon"
id="alertIcon">

<i class="fa-solid fa-check"></i>

</div>

<div class="alert-content">

<div class="alert-title"
id="alertTitle">

Success

</div>

<div class="alert-text"
id="alertText">

Message here

</div>

</div>

<div class="alert-close"
onclick="closeTopAlert()">

<i class="fa-solid fa-xmark"></i>

</div>

</div>
  
  
  

<img id="hero" class="hero">

<div class="container">

  <div class="title" id="title">Loading...</div>
  <div class="price">₹<span id="price">0</span></div>
  <div class="desc" id="desc"></div>

  <div class="related">
    <h3>More Products</h3>
    <div class="grid" id="related"></div>
  </div>

</div>

<div class="bottom">
  <button onclick="addToCart()">Add to Cart</button>
</div>

<script>

const id = new URLSearchParams(window.location.search).get("id");

let product = null;

/* SUPABASE LOAD */
async function loadProduct(){

  const { data } = await supabaseClient
    .from("products")
    .select("*")
    .eq("id", id)
    .single();

  product = data;

  document.getElementById("hero").src = data.image;
  document.getElementById("title").innerText = data.title;
  document.getElementById("price").innerText = data.price;
  document.getElementById("desc").innerText = data.description || "";

  loadRelated(data.category);
}

/* RELATED */
async function loadRelated(cat){

  const { data } = await supabaseClient
    .from("products")
    .select("*")
    .eq("category", cat);

  let box = document.getElementById("related");
  box.innerHTML = "";

  data.forEach(item => {
    box.innerHTML += `
      <div class="card">
        <img src="${item.image}">
        <b>${item.title}</b>
        <div>₹${item.price}</div>
      </div>
    `;
  });
}

/* CART */
function getCart(){
  return JSON.parse(localStorage.getItem("cart") || "[]");
}

function saveCart(cart){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* ADD TO CART */
function addToCart(){

  let cart = getCart();

  let item = cart.find(i => i.id == product.id);

  if(item){
    item.qty++;
  }else{
    cart.push({
      id: product.id,
      title: product.title,
      price: product.price,
      image: product.image,
      qty: 1
    });
  }

  saveCart(cart);

showTopAlert(
  "success",
  "Success",
  "Product added to your cart."
);

setTimeout(() => {
  window.location.href = "cart.html";
}, 1200); // 1.2 seconds
}
loadProduct();

// =========================
// TOP ALERT
// =========================

function showTopAlert(type,title,message){

const alertBox =
document.getElementById("topAlert");

const alertIcon =
document.getElementById("alertIcon");

document.getElementById("alertTitle")
.innerText = title;

document.getElementById("alertText")
.innerText = message;

// RESET
alertBox.classList.remove(
"success",
"error"
);

// TYPE
if(type === "success"){

alertBox.classList.add("success");

alertIcon.innerHTML = `
<i class="fa-solid fa-check"></i>
`;

}else{

alertBox.classList.add("error");

alertIcon.innerHTML = `
<i class="fa-solid fa-xmark"></i>
`;

}

// SHOW
alertBox.classList.add("show");

// AUTO HIDE
setTimeout(()=>{

closeTopAlert();

},3000);

}

// CLOSE
function closeTopAlert(){

document.getElementById("topAlert")
.classList.remove("show");

}



</script>
<script src="back.js"></script>
</body>
</html>
