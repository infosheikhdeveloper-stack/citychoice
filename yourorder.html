    Your Orders

</div>

<script>
// ================= SUPABASE =================

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0dWNoaWxjc3d0bm5sZHJ1Z2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNjAyNDQsImV4cCI6MjA5NDczNjI0NH0.88SWE5lvsJD0Fw8x7h4pgAmq1WFRN1qMvmXHCXeDqsU";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ================= LOCATION =================

// EMPTY STATE HTML TEMPLATE

        <rect x="260" y="130" width="100" height="110" rx="8" fill="#eef6ff" stroke="#cbd5e1"/>
        
        <!-- Cake Inside -->
        <rect x="165" y="180" width="50" height="25" rx="4" fill="#ff2b2b"/>
        <rect x="172" y="165" width="36" height="18" rx="3" fill="#ffffff"/>

      <!-- DELIVERY VAN -->

        <text x="95" y="198" font-family="'Poppins', sans-serif" font-weight="900" font-size="9" fill="#ff2b2b" text-anchor="middle">CITY CHOICE</text>
        <text x="95" y="209" font-family="'Poppins', sans-serif" font-weight="700" font-size="6" fill="#111" text-anchor="middle">EXPRESS DELIVERY</text>
        
        <!-- Wheels -->
        <circle cx="75" cy="250" r="15" fill="#111"/>

`;

// ================= LOAD ORDERS =================
async function loadOrders(){
  const ordersBox = document.getElementById("ordersBox");
  const { data:{ user } } = await supabaseClient.auth.getUser();

  if(!user){
    ordersBox.innerHTML = emptyStateHTML("Login and place your first order");
    return;
  }

  const { data, error } = await supabaseClient
    .from("orders")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending:false });

  if(error){
    ordersBox.innerHTML = `<p style="color:red; text-align:center;">${error.message}</p>`;
    return;
  }

  if(!data || data.length === 0){
    ordersBox.innerHTML = emptyStateHTML("Your delicious City Choice orders will appear here!");
    return;
  }

  // SHOW ORDERS
  ordersBox.innerHTML = "";
  data.forEach(order => {
    let itemsHTML = "";
    let items = order.items;
    if(typeof items === "string") items = JSON.parse(items);

    (items || []).forEach(item => {
      itemsHTML += `
      <div class="item-row">
        <img src="${item.image}">
        <div class="item-info">
          <div class="item-name">${item.title}</div>
          <div class="item-qty">Qty : ${item.qty}</div>
        </div>
        <div class="item-price">₹${item.price * item.qty}</div>
      </div>
      `;
    });

    ordersBox.innerHTML += `
    <div class="order-card">
      <div class="order-top">
        <div>
          <h3>${order.customer_name}</h3>
          <p>${order.phone}</p>
          <p>${user.email}</p>
        </div>
        <div class="status">${order.status}</div>
      </div>
      <div class="order-meta">
        <div>
          <span>Order ID</span>
          <b>${order.order_id}</b>
        </div>
        <div>
          <span>Package Code</span>
          <b>${order.package_code}</b>
        </div>
      </div>
      <div class="items-box">${itemsHTML}</div>
      <div class="total-row">
        <span>Grand Total</span>
        <b>₹${order.grand_total}</b>
      </div>
      <a href="viewdetail.html?id=${order.id}" class="view-btn">View Details</a>
    </div>
    `;
  });
}

loadOrders();
</script>
<script src="back.js"></script>
</body>
</html>
